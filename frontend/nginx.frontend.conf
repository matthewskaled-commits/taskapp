# Configuracion de NGINX dentro del contenedor del frontend.
# Sirve la SPA y redirige cualquier ruta desconocida a index.html
# (necesario porque React maneja sus propias rutas en el navegador).
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}
