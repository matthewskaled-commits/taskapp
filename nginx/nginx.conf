# NGINX actua aqui como "puerta de entrada unica" (reverse proxy):
# el usuario solo necesita conocer un puerto (8080) y NGINX decide
# internamente si la peticion va al frontend o al backend.
# Esto tambien permite balancear carga si en el futuro hay varias
# instancias del backend (se agregarian mas "server" dentro del upstream).

events {
    worker_connections 1024;
}

http {
    upstream backend_servers {
        # Si se escalara el backend a varias instancias, se agregarian
        # mas lineas aqui y NGINX repartiria las peticiones entre ellas
        # (round robin por defecto = balanceo de carga).
        server backend:4000;
    }

    upstream frontend_server {
        server frontend:80;
    }

    server {
        listen 80;

        # Las peticiones que empiezan con /api van al backend
        location /api/ {
            proxy_pass http://backend_servers/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Las metricas tambien se exponen a traves del proxy
        location /metrics {
            proxy_pass http://backend_servers/metrics;
        }

        # Todo lo demas va al frontend (la SPA de React)
        location / {
            proxy_pass http://frontend_server/;
            proxy_set_header Host $host;
        }
    }
}
