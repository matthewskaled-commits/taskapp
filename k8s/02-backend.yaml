# --- Deployment del backend ---
# replicas: 2 -> Kubernetes mantiene SIEMPRE 2 copias corriendo.
# Si una falla, la reemplaza sola (auto-recuperacion) y reparte trafico entre ambas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: taskapp
spec:
  replicas: 2
  selector:
    matchLabels: { app: backend }
  template:
    metadata:
      labels: { app: backend }
    spec:
      containers:
        - name: backend
          image: taskapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 4000 }]
          env:
            - name: PORT
              value: "4000"
            - name: DB_HOST
              value: postgres
            - name: DB_PORT
              value: "5432"
          envFrom:
            - secretRef: { name: postgres-secret }
          readinessProbe:
            httpGet: { path: /health, port: 4000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "300m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taskapp
spec:
  selector: { app: backend }
  ports:
    - port: 4000
      targetPort: 4000
